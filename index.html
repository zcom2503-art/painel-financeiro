<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Financeiro - Portfólio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header>
        <h1>Painel de Operações 📊</h1>
    </header>

    <main>
        <section class="cards-container">
            <div class="card">
                <h3>Entradas 📈</h3>
                <p id="entradas">R$ 0,00</p>
            </div>
            <div class="card">
                <h3>Saídas 📉</h3>
                <p id="saidas">R$ 0,00</p>
            </div>
            <div class="card total">
                <h3>Saldo Atual 💰</h3>
                <p id="saldo">R$ 0,00</p>
            </div>
        </section>

        <section class="nova-operacao">
            <h3>Nova Transação</h3>
            <form id="formulario">
                <input type="text" id="descricao" placeholder="Descrição (ex: Salário, Mercado...)" required>
                <input type="number" id="valor" placeholder="Valor (positivo para entrada, negativo para saída)" step="0.01" required>
                <button type="submit">Adicionar</button>
            </form>
        </section>

        <section class="historico">
            <h3>Extrato de Operações</h3>
            <ul id="lista-transacoes">
                </ul>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
